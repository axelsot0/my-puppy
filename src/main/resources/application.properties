# ===========================================
# My Puppy - Generic Booking Platform API
# ===========================================

# --- HTTP ---
quarkus.http.port=8080

# --- Datasource: Dev/Test (H2) ---
%dev.quarkus.datasource.db-kind=h2
%dev.quarkus.datasource.jdbc.url=jdbc:h2:mem:mypuppydb;DB_CLOSE_DELAY=-1
%dev.quarkus.datasource.username=sa
%dev.quarkus.datasource.password=

%test.quarkus.datasource.db-kind=h2
%test.quarkus.datasource.jdbc.url=jdbc:h2:mem:mypuppydb;DB_CLOSE_DELAY=-1
%test.quarkus.datasource.username=sa
%test.quarkus.datasource.password=

# --- Datasource: Production (PostgreSQL) ---
%prod.quarkus.datasource.db-kind=postgresql
%prod.quarkus.datasource.jdbc.url=jdbc:postgresql://localhost:5432/mypuppydb
%prod.quarkus.datasource.username=${DB_USER:mypuppy}
%prod.quarkus.datasource.password=${DB_PASSWORD:}

# --- Hibernate ORM ---
quarkus.hibernate-orm.database.generation=drop-and-create
%prod.quarkus.hibernate-orm.database.generation=validate
quarkus.hibernate-orm.log.sql=true
%prod.quarkus.hibernate-orm.log.sql=false

# --- JWT ---
mp.jwt.verify.publickey.location=publicKey.pem
mp.jwt.verify.issuer=my-puppy
smallrye.jwt.sign.key.location=privateKey.pem
smallrye.jwt.new-token.issuer=my-puppy

# --- Super Admin (bootstrap) ---
mypuppy.super-admin.email=${SUPER_ADMIN_EMAIL:admin@mypuppy.com}
mypuppy.super-admin.password=${SUPER_ADMIN_PASSWORD:admin123}
mypuppy.super-admin.name=${SUPER_ADMIN_NAME:Platform Admin}

# --- OpenAPI / Swagger UI ---
quarkus.swagger-ui.always-include=true
quarkus.smallrye-openapi.info-title=My Puppy API
quarkus.smallrye-openapi.info-version=1.0.0
quarkus.smallrye-openapi.info-description=Generic multi-tenant booking platform API

# --- OTP / Email ---
mypuppy.otp.expiration-minutes=${OTP_EXPIRATION_MINUTES:5}
mypuppy.otp.max-attempts=${OTP_MAX_ATTEMPTS:5}
mypuppy.otp.mail.from=${OTP_MAIL_FROM:no-reply@mypuppy.com}
mypuppy.otp.mail.subject=${OTP_MAIL_SUBJECT:Your My Puppy OTP code}

%dev.quarkus.mailer.mock=true
%test.quarkus.mailer.mock=true
